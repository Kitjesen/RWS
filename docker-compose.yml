version: "3.9"

# ============================================================
# RWS — Docker Compose deployment stack
#
# Services:
#   backend     — Flask REST API + gRPC + pipeline (ports 5000, 50051)
#   frontend    — Flutter web dashboard via nginx (port 8080)
#   prometheus  — Metrics scraping (port 9090)
#   grafana     — Dashboard visualization (port 3000)
#
# Quick start:
#   docker compose up -d
#   open http://localhost:8080   (Flutter dashboard)
#   open http://localhost:3000   (Grafana — admin/admin)
#   curl http://localhost:5000/api/health
#
# With a live USB camera:
#   Uncomment the "devices" block under the backend service.
#
# Environment overrides:
#   Copy .env.example to .env and edit before running.
# ============================================================

services:

  # ----------------------------------------------------------
  # Python backend: Flask REST API + gRPC + tracking pipeline
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: rws-backend:latest
    container_name: rws-backend
    ports:
      - "5000:5000"    # REST API
      - "50051:50051"  # gRPC API
    volumes:
      # Config is bind-mounted read-only so hot-reload sees edits on the host
      - ./config.yaml:/app/config.yaml:ro
      # Mission profiles (hot-editable on the host)
      - ./profiles:/app/profiles:ro
      # Persist audit logs, clips, telemetry across restarts
      - ./logs:/app/logs
      # Optional: mount YOLO model weights directory to avoid re-download
      - ./models:/app/models:ro
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      # Operator watchdog timeout (seconds). Increase for manual-fire workflows.
      - RWS_OPERATOR_TIMEOUT=${RWS_OPERATOR_TIMEOUT:-10}
      # Optional API key for fire-control endpoints (leave empty to disable)
      - RWS_API_KEY=${RWS_API_KEY:-}
      # Log level: DEBUG | INFO | WARNING | ERROR
      - RWS_LOG_LEVEL=${RWS_LOG_LEVEL:-INFO}
      # Telemetry / audit log paths (inside container)
      - RWS_AUDIT_LOG=logs/audit.jsonl
      - RWS_TELEMETRY_LOG=logs/telemetry.jsonl
    # Uncomment to pass through a USB camera from the host:
    # devices:
    #   - /dev/video0:/dev/video0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: '3.0'
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # Flutter web dashboard — built inside Docker, served by nginx
  # ----------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: rws-frontend:latest
    container_name: rws-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ----------------------------------------------------------
  # Prometheus — scrapes /metrics from the backend
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: rws-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ----------------------------------------------------------
  # Grafana — visualizes Prometheus metrics
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: rws-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

volumes:
  prometheus_data:
  grafana_data:
