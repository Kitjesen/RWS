version: "3.9"

# ============================================================
# RWS — Docker Compose deployment stack
#
# Services:
#   rws-backend  — Flask API + pipeline (port 5000)
#   rws-frontend — Flutter web dashboard served by nginx (port 8080)
#   prometheus   — Metrics scraping (port 9090)
#   grafana      — Dashboard visualization (port 3000)
#
# Quick start:
#   docker compose up -d
#   open http://localhost:8080  (Flutter dashboard)
#   open http://localhost:3000  (Grafana — admin/admin)
#
# For live camera access add: --device /dev/video0 to rws-backend
# ============================================================

services:

  rws-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: rws-backend:latest
    container_name: rws-backend
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs           # persist audit logs, clips, telemetry
      - ./profiles:/app/profiles   # mission profiles (hot-editable)
      - ./config.yaml:/app/config.yaml:ro  # system config (read-only)
    environment:
      - FLASK_ENV=production
      - RWS_LOG_LEVEL=INFO
      - RWS_AUDIT_LOG=logs/audit.jsonl
      - RWS_TELEMETRY_LOG=logs/telemetry.jsonl
    # Uncomment to pass through a USB camera:
    # devices:
    #   - /dev/video0:/dev/video0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  rws-frontend:
    image: nginx:alpine
    container_name: rws-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/build/web:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rws-backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: rws-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: rws-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
