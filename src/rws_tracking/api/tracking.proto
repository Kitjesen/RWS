syntax = "proto3";

package rws_tracking;

// RWS Tracking gRPC Service
service TrackingService {
  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // Start tracking
  rpc StartTracking(StartTrackingRequest) returns (StartTrackingResponse);

  // Stop tracking
  rpc StopTracking(StopTrackingRequest) returns (StopTrackingResponse);

  // Get status
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // Set gimbal position (absolute)
  rpc SetGimbalPosition(SetGimbalPositionRequest) returns (SetGimbalPositionResponse);

  // Set gimbal rate (velocity)
  rpc SetGimbalRate(SetGimbalRateRequest) returns (SetGimbalRateResponse);

  // Get telemetry
  rpc GetTelemetry(GetTelemetryRequest) returns (GetTelemetryResponse);

  // Update configuration
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);

  // Stream status updates (real-time)
  rpc StreamStatus(StreamStatusRequest) returns (stream StatusUpdate);

  // Stream video frames (annotated JPEG)
  rpc StreamFrames(StreamFramesRequest) returns (stream VideoFrame);

  // Get safety status
  rpc GetSafetyStatus(GetSafetyStatusRequest) returns (GetSafetyStatusResponse);

  // Set operator authorization
  rpc SetOperatorAuth(SetOperatorAuthRequest) returns (SetOperatorAuthResponse);

  // Emergency stop
  rpc EmergencyStop(EmergencyStopRequest) returns (EmergencyStopResponse);

  // Get threat assessment
  rpc GetThreatAssessment(GetThreatAssessmentRequest) returns (GetThreatAssessmentResponse);

  // -------------------------------------------------------------------------
  // Fire control
  // -------------------------------------------------------------------------

  // Arm the shooting chain (SAFE -> ARMED)
  rpc ArmSystem(ArmRequest) returns (FireControlResponse);

  // Return the shooting chain to SAFE state
  rpc SafeSystem(SafeRequest) returns (FireControlResponse);

  // Request fire (FIRE_AUTHORIZED -> FIRE_REQUESTED)
  rpc RequestFire(RequestFireRequest) returns (FireControlResponse);

  // Get current fire chain status
  rpc GetFireStatus(GetFireStatusRequest) returns (FireControlResponse);

  // Operator heartbeat (prevent watchdog timeout)
  rpc OperatorHeartbeat(OperatorHeartbeatRequest) returns (OperatorHeartbeatResponse);

  // Designate a specific target for engagement (C2 override)
  rpc DesignateTarget(DesignateTargetRequest) returns (DesignateTargetResponse);

  // Clear operator target designation (return to auto-selection)
  rpc ClearDesignation(ClearDesignationRequest) returns (DesignateTargetResponse);

  // Get current designation status
  rpc GetDesignation(GetDesignationRequest) returns (DesignateTargetResponse);

  // -------------------------------------------------------------------------
  // Mission management
  // -------------------------------------------------------------------------

  // Start a new mission session
  rpc StartMission(StartMissionRequest) returns (MissionResponse);

  // End the active mission and generate debrief report
  rpc EndMission(EndMissionRequest) returns (MissionResponse);

  // Get current mission status
  rpc GetMissionStatus(GetMissionStatusRequest) returns (MissionStatusResponse);

  // -------------------------------------------------------------------------
  // Safety zone CRUD (No-Fire Zones)
  // -------------------------------------------------------------------------

  // List all active no-fire zones
  rpc ListZones(ListZonesRequest) returns (ListZonesResponse);

  // Add a new no-fire zone
  rpc AddZone(AddZoneRequest) returns (ZoneResponse);

  // Remove a no-fire zone by ID
  rpc RemoveZone(RemoveZoneRequest) returns (ZoneResponse);

  // Get a specific no-fire zone by ID
  rpc GetZone(GetZoneRequest) returns (SafetyZoneMsg);
}

// ============================================================================
// Health Check
// ============================================================================

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  string service = 2;
}

// ============================================================================
// Start Tracking
// ============================================================================

message StartTrackingRequest {
  oneof camera_source {
    int32 camera_id = 1;
    string video_path = 2;
  }
}

message StartTrackingResponse {
  bool success = 1;
  string message = 2;
  string error = 3;
}

// ============================================================================
// Stop Tracking
// ============================================================================

message StopTrackingRequest {}

message StopTrackingResponse {
  bool success = 1;
  string message = 2;
  string error = 3;
}

// ============================================================================
// Get Status
// ============================================================================

message GetStatusRequest {}

message GetStatusResponse {
  bool running = 1;
  int64 frame_count = 2;
  int64 error_count = 3;
  string last_error = 4;
  double fps = 5;
  GimbalState gimbal = 6;
}

message GimbalState {
  double yaw_deg = 1;
  double pitch_deg = 2;
  double yaw_rate_dps = 3;
  double pitch_rate_dps = 4;
}

// ============================================================================
// Set Gimbal Position
// ============================================================================

message SetGimbalPositionRequest {
  double yaw_deg = 1;
  double pitch_deg = 2;
}

message SetGimbalPositionResponse {
  bool success = 1;
  string error = 2;
  GimbalPosition target = 3;
  GimbalPosition current = 4;
}

message GimbalPosition {
  double yaw_deg = 1;
  double pitch_deg = 2;
}

// ============================================================================
// Set Gimbal Rate
// ============================================================================

message SetGimbalRateRequest {
  double yaw_rate_dps = 1;
  double pitch_rate_dps = 2;
}

message SetGimbalRateResponse {
  bool success = 1;
  string error = 2;
  GimbalRate command = 3;
}

message GimbalRate {
  double yaw_rate_dps = 1;
  double pitch_rate_dps = 2;
}

// ============================================================================
// Get Telemetry
// ============================================================================

message GetTelemetryRequest {}

message GetTelemetryResponse {
  bool success = 1;
  string error = 2;
  map<string, double> metrics = 3;
}

// ============================================================================
// Update Config
// ============================================================================

message UpdateConfigRequest {
  string config_json = 1;  // JSON-encoded configuration
}

message UpdateConfigResponse {
  bool success = 1;
  string message = 2;
  string error = 3;
}

// ============================================================================
// Stream Status
// ============================================================================

message StreamStatusRequest {
  double update_rate_hz = 1;  // Desired update rate (default: 10 Hz)
}

message StatusUpdate {
  double timestamp = 1;
  bool running = 2;
  int64 frame_count = 3;
  double fps = 4;
  GimbalState gimbal = 5;
}

// ============================================================================
// Stream Video Frames
// ============================================================================

message StreamFramesRequest {
  double max_fps = 1;            // Desired frame rate (default: 15 Hz)
  double scale_factor = 2;       // Resolution scale (0-1, default: 0.5)
  int32 jpeg_quality = 3;        // JPEG quality (1-100, default: 70)
  bool annotate = 4;             // Include detection/track overlays
}

message VideoFrame {
  double timestamp = 1;
  bytes jpeg_data = 2;           // JPEG-encoded frame
  int32 width = 3;
  int32 height = 4;
  int64 frame_number = 5;
  repeated DetectedTarget targets = 6;   // Detected targets in this frame
}

message DetectedTarget {
  int32 track_id = 1;
  string class_id = 2;
  float confidence = 3;
  BoundingBoxMsg bbox = 4;
  float velocity_x = 5;         // px/s
  float velocity_y = 6;         // px/s
  bool is_selected = 7;         // Currently selected for tracking
}

message BoundingBoxMsg {
  float x = 1;
  float y = 2;
  float w = 3;
  float h = 4;
}

// ============================================================================
// Safety Status
// ============================================================================

message GetSafetyStatusRequest {}

message GetSafetyStatusResponse {
  bool fire_authorized = 1;
  string blocked_reason = 2;
  string active_zone = 3;
  bool operator_override = 4;
  bool emergency_stop = 5;
}

// ============================================================================
// Operator Authorization
// ============================================================================

message SetOperatorAuthRequest {
  bool authorized = 1;
}

message SetOperatorAuthResponse {
  bool success = 1;
  string error = 2;
}

// ============================================================================
// Emergency Stop
// ============================================================================

message EmergencyStopRequest {
  bool activate = 1;            // true = engage, false = release
}

message EmergencyStopResponse {
  bool success = 1;
  bool emergency_stop_active = 2;
  string error = 3;
}

// ============================================================================
// Threat Assessment
// ============================================================================

message GetThreatAssessmentRequest {}

message GetThreatAssessmentResponse {
  repeated ThreatTarget threats = 1;
}

message ThreatTarget {
  int32 track_id = 1;
  float threat_score = 2;
  float distance_score = 3;
  float velocity_score = 4;
  float class_score = 5;
  float heading_score = 6;
  int32 priority_rank = 7;
}

// ============================================================================
// Fire Control
// ============================================================================

// Generic response for fire-chain state transitions.
message FireControlResponse {
  bool success = 1;
  string state = 2;         // Current ShootingChain state value (e.g. "ARMED")
  bool can_fire = 3;        // True when chain.can_fire is set
  string message = 4;       // Human-readable detail or error text
  string operator_id = 5;   // Operator that performed the action
}

message ArmRequest {
  string operator_id = 1;   // Required — identifies the arming operator
}

message SafeRequest {
  string reason = 1;        // Optional — reason for returning to safe
}

message RequestFireRequest {
  string operator_id = 1;   // Required — human confirmation of fire request
}

message GetFireStatusRequest {}

// ============================================================================
// Operator Heartbeat
// ============================================================================

message OperatorHeartbeatRequest {
  string operator_id = 1;
}

message OperatorHeartbeatResponse {
  bool ok = 1;
  string operator_id = 2;
}

// ============================================================================
// Target Designation
// ============================================================================

message DesignateTargetRequest {
  int32 track_id = 1;
  string operator_id = 2;  // Optional
}

message ClearDesignationRequest {}

message GetDesignationRequest {}

message DesignateTargetResponse {
  bool ok = 1;
  int32 track_id = 2;         // Designated track ID; 0 means none
  bool designated = 3;        // True when a designation is active
  string cleared_track_id = 4; // Used by ClearDesignation to report previous ID
}

// ============================================================================
// Mission Management
// ============================================================================

message StartMissionRequest {
  string profile = 1;          // Optional mission profile name
  int32 camera_source = 2;     // Camera index (default 0)
  string mission_name = 3;     // Optional display name
}

message EndMissionRequest {
  string reason = 1;           // Optional reason for ending mission
}

message GetMissionStatusRequest {}

message MissionResponse {
  bool ok = 1;
  string session_id = 2;
  string message = 3;
  string error = 4;
  double elapsed_s = 5;
  string report_path = 6;
  string report_url = 7;
}

message MissionStatusResponse {
  bool active = 1;
  string session_id = 2;
  string profile = 3;
  string started_at = 4;
  double elapsed_s = 5;
  int32 targets_engaged = 6;
  string fire_chain_state = 7;
}

// ============================================================================
// Safety Zone CRUD (No-Fire Zones)
// ============================================================================

message SafetyZoneMsg {
  string zone_id = 1;
  double center_yaw_deg = 2;
  double center_pitch_deg = 3;
  double radius_deg = 4;
  string zone_type = 5;         // e.g. "no_fire"
  bool found = 6;               // False when get_zone returns a 404
  string error = 7;
}

message ListZonesRequest {}

message ListZonesResponse {
  repeated SafetyZoneMsg zones = 1;
}

message AddZoneRequest {
  string zone_id = 1;           // Optional — auto-generated when empty
  double center_yaw_deg = 2;
  double center_pitch_deg = 3;
  double radius_deg = 4;
  string zone_type = 5;         // Default "no_fire"
}

message RemoveZoneRequest {
  string zone_id = 1;
}

message GetZoneRequest {
  string zone_id = 1;
}

message ZoneResponse {
  bool ok = 1;
  string zone_id = 2;
  string error = 3;
}
