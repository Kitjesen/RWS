# ============================================================
# RWS Vision-Gimbal Tracking System Configuration
# ============================================================

camera:
  width: 1280
  height: 720
  fx: 970.0
  fy: 965.0
  cx: 640.0
  cy: 360.0
  # OpenCV 5-param distortion [k1, k2, p1, p2, k3]
  distortion_k1: 0.0
  distortion_k2: 0.0
  distortion_p1: 0.0
  distortion_p2: 0.0
  distortion_k3: 0.0
  # Camera-to-gimbal mount offsets (degrees)
  mount_roll_deg: 0.0
  mount_pitch_deg: 0.0
  mount_yaw_deg: 0.0

detector:
  # --- 检测+分割+跟踪模型 (推荐) ---
  model_path: "yolo11n-seg.pt"        # 实例分割模型（Kalman平滑 + mask质心）
  # --- 仅检测模型 (轻量备选) ---
  # model_path: "yolo11n.pt"
  # --- 中等模型（精度更高，速度更慢） ---
  # model_path: "yolo11s-seg.pt"
  # --- 使用微调后的自定义模型（训练完后取消注释） ---
  # model_path: "runs/rws_finetune/weights/best.pt"
  confidence_threshold: 0.35          # 稍降阈值（更敏感，避免漏检；selector 负责筛选稳定目标）
  nms_iou_threshold: 0.40             # 更严格的 NMS（减少重叠框）
  img_size: 640
  device: ""                          # "" = auto, "cpu", "cuda:0"
  tracker: "botsort.yaml"            # BoT-SORT (Kalman+ReID); 备选: "bytetrack.yaml"
  class_whitelist:                    # 微调后改成你的类别名，如 ["target"]
    - person

selector:
  weights:
    confidence: 0.35             # 检测置信度权重（最重要的稳定性指标）
    size: 0.18                   # 目标面积（近目标优先）
    center_proximity: 0.20       # 画面中心接近度
    track_age: 0.15              # 跟踪年龄（越久越可靠）
    class_weight: 0.10           # 目标类别权重
    switch_penalty: 0.35         # 切换惩罚（提高，减少无效切换）
    velocity_approach: 0.12      # 目标向画面中心接近的速度奖励（逼近目标优先）
  min_hold_time_s: 0.5           # 最小保持时间 0.5s（提升稳定性）
  delta_threshold: 0.15          # 需要分数差 >15% 才切换（防抖）
  preferred_classes:
    person: 1.0
    car: 0.6

controller:
  yaw_pid:
    kp: 6.0                      # 提高比例增益，加快响应
    ki: 0.5                      # 积分增益，消除稳态误差
    kd: 0.40                     # 微分增益，抑制超调
    integral_limit: 40.0
    output_limit: 180.0
    derivative_lpf_alpha: 0.35   # 微分低通滤波（平衡噪声与响应）
    feedforward_kv: 0.80         # 速度前馈增益：补偿 80% 目标角速度
  pitch_pid:
    kp: 6.5
    ki: 0.45
    kd: 0.40
    integral_limit: 40.0
    output_limit: 180.0
    derivative_lpf_alpha: 0.35
    feedforward_kv: 0.75
  max_rate_dps: 180.0
  command_lpf_alpha: 0.80         # 适度平滑，兼顾响应速度与稳定性
  lock_error_threshold_deg: 1.2   # 锁定阈值（宽松一点方便锁定，LOCK 状态后精度更高）
  lock_hold_time_s: 0.3           # 连续满足锁定条件 0.3s 才进入 LOCK
  predict_timeout_s: 0.50         # CA模型预测超时从 0.25s 延长到 0.5s（加速度项提高精度）
  lost_timeout_s: 1.5
  max_track_error_timeout_s: 5.0  # 持续高误差超时后回退 SEARCH (s)
  high_error_multiplier: 5.0      # "误差过大"判断倍数 (× lock_error_threshold_deg)
  scan_pattern: [45.0, 18.0]      # [yaw_amplitude_dps, pitch_amplitude_dps]
  scan_freq_hz: 0.18              # 扫描频率 (Hz, ~5.6s 周期，比之前快)
  scan_yaw_scale: 1.0             # yaw 幅度系数
  scan_pitch_scale: 0.35          # pitch 幅度系数
  scan_pitch_freq_ratio: 0.65     # pitch 频率 / yaw 频率（利沙如扫描，覆盖更密）
  latency_compensation_s: 0.033   # 补偿约 1 帧延迟 (30Hz)

# 弹道补偿（controller 内置）
  ballistic:
    enabled: false
    model_type: "simple"          # "simple" | "table" | "physics"
    target_height_m: 1.8
    # Simple 模型
    quadratic_a: 0.001
    quadratic_b: 0.01
    quadratic_c: 0.0
    # Physics 模型 (model_type="physics" 时生效)
    muzzle_velocity_mps: 900.0
    bc_g7: 0.223
    mass_kg: 0.0098
    caliber_m: 0.00762

  # 自适应 PID 增益调度
  adaptive_pid:
    enabled: true                  # 启用误差自适应增益调度
    scheduler_type: "error_based"
    low_error_threshold_deg: 1.2   # 误差 < 1.2° 时使用低增益（精密跟踪）
    high_error_threshold_deg: 8.0  # 误差 > 8° 时使用高增益（快速追赶）
    low_error_multiplier: 0.55     # 低误差区增益倍数（抑制抖动）
    high_error_multiplier: 1.6     # 高误差区增益倍数（快速追赶）

# 云台驱动限位与动力学参数
driver_limits:
  yaw_min_deg: -160.0
  yaw_max_deg: 160.0
  pitch_min_deg: -45.0
  pitch_max_deg: 75.0
  max_rate_dps: 240.0
  deadband_dps: 0.2
  inertia_time_constant_s: 0.05   # 一阶惯性时间常数
  static_friction_dps: 0.5        # 静摩擦阈值
  coulomb_friction_dps: 2.0       # 库仑摩擦

# ============================================================
# v1.1 扩展模块 — 完整射击链路
# ============================================================

# 弹丸物理参数 (用于 pipeline 级弹道解算)
projectile:
  enabled: false                  # true 启用物理弹道解算
  muzzle_velocity_mps: 850.0     # 枪口初速 (m/s)
  ballistic_coefficient: 0.4     # 弹道系数 (G1)
  projectile_mass_kg: 0.0098     # 弹丸质量 (kg)
  projectile_diameter_m: 0.00762 # 弹丸口径 (m)
  drag_model: "g1"               # "g1" | "g7"

# 射击环境
environment:
  temperature_c: 15.0
  pressure_hpa: 1013.25
  humidity_pct: 50.0
  wind_speed_mps: 0.0
  wind_direction_deg: 0.0
  altitude_m: 0.0

# 射击提前量
lead_angle:
  enabled: true
  use_acceleration: true          # 使用加速度项 (二阶预测)
  max_lead_deg: 5.0               # 提前量角度上限 (°)
  min_confidence: 0.3             # 最低置信度阈值
  velocity_smoothing_alpha: 0.7   # 速度平滑系数
  target_height_m: 1.8
  convergence_iterations: 3       # 飞行时间迭代次数

# 轨迹规划 (目标切换平滑过渡)
trajectory:
  enabled: false
  max_rate_dps: 180.0             # 最大角速度 (°/s)
  max_acceleration_dps2: 720.0    # 最大角加速度 (°/s²)
  settling_threshold_deg: 0.5     # 到达判定阈值 (°)
  use_s_curve: false              # S-曲线模式 (减少 jerk)
  max_jerk_dps3: 3600.0
  min_switch_interval_s: 0.3      # 最小切换间隔 (防抖)

# 多目标交战
engagement:
  enabled: true
  strategy: "threat_first"        # "threat_first" | "nearest_first" | "sector_sweep"
  max_engagement_range_m: 500.0
  min_threat_threshold: 0.1
  distance_decay_m: 50.0
  velocity_norm_px_s: 200.0
  target_height_m: 1.8
  sector_size_deg: 30.0
  weights:
    distance: 0.30
    velocity: 0.25
    class_threat: 0.20
    heading: 0.15
    size: 0.10

# 安全系统
safety:
  enabled: true
  nfz_slow_down_margin_deg: 5.0   # 禁射区缓冲带宽度 (°)
  # --- Two-man arming rule ---
  # When true, two different operators must independently call POST /api/fire/arm
  # within arm_confirmation_timeout_s seconds to transition SAFE -> ARMED.
  # Set to true for live operations.
  two_man_rule: false
  arm_confirmation_timeout_s: 30
  # --- Rules of Engagement profile ---
  # training  : dry-fire only (default, safest for testing)
  # exercise  : engagement enabled, relaxed constraints
  # live      : maximum safety checks, two-man rule recommended
  roe_profile: training
  interlock:
    require_operator_auth: true
    min_lock_time_s: 1.0
    min_engagement_range_m: 5.0
    max_engagement_range_m: 500.0
    system_check_interval_s: 1.0
    heartbeat_timeout_s: 5.0
  zones: []                       # 禁射区列表, 见下方示例
  # zones:
  #   - zone_id: "nfz_building"
  #     center_yaw_deg: 45.0
  #     center_pitch_deg: 10.0
  #     radius_deg: 15.0
  #     zone_type: "no_fire"
  #   - zone_id: "caution_road"
  #     center_yaw_deg: -30.0
  #     center_pitch_deg: 0.0
  #     radius_deg: 10.0
  #     zone_type: "caution"

# 激光测距仪
rangefinder:
  enabled: true
  type: "simulated"               # "simulated" | "serial"
  max_range_m: 1500.0
  min_range_m: 1.0
  noise_std_m: 0.5
  failure_rate: 0.05
  max_laser_age_s: 0.5
  target_height_m: 1.8
  serial_port: ""
  serial_baud: 9600

# 视频流
video_stream:
  enabled: true
  jpeg_quality: 70
  max_fps: 30.0
  scale_factor: 1.0
  buffer_size: 3
  annotate_detections: true
  annotate_tracks: true
  annotate_crosshair: true
  annotate_safety_zones: true

# 任务会话 / 审计
session:
  fire_cooldown_s: 3.0           # minimum seconds between successive shots
  audit_log_path: "logs/audit.jsonl"
  telemetry_log_path: "logs/telemetry.jsonl"

# 目标生命周期管理
lifecycle:
  confirm_frames: 3              # frames a detection must persist before becoming DETECTED
  archive_timeout_s: 10.0        # seconds after last seen before target is ARCHIVED

# 事件片段录制（VideoRingBuffer）
clip:
  buffer_duration_s: 10.0        # ring-buffer window size
  pre_event_s: 3.0               # seconds of pre-event footage to keep
  post_event_s: 2.0              # seconds of post-event footage to save
  output_dir: "logs/clips"
  fps: 30.0
