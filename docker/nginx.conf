server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web — SPA routing (HTML5 history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API calls to the backend service
    # "backend" resolves via Docker Compose DNS to the backend container
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # SSE (Server-Sent Events) — must disable buffering and extend timeout
    # Flutter AlertBannerOverlay and live push events use this endpoint
    location /api/events {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # MJPEG video stream — disable buffering for low-latency streaming
    location /stream {
        proxy_pass http://backend:5000/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    # Prometheus metrics passthrough
    location /metrics {
        proxy_pass http://backend:5000/metrics;
    }
}
