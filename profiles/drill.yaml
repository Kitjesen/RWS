# ============================================================
# Mission Profile: Drill (Training)
# Simulated driver, safety interlocks disabled, fast PID
# ============================================================

camera:
  width: 1280
  height: 720
  fx: 970.0
  fy: 965.0
  cx: 640.0
  cy: 360.0

detector:
  model_path: "yolo11n-seg.pt"
  confidence_threshold: 0.40
  nms_iou_threshold: 0.45
  img_size: 640
  device: ""
  tracker: "botsort.yaml"
  class_whitelist:
    - person

selector:
  weights:
    confidence: 0.35
    size: 0.20
    center_proximity: 0.20
    track_age: 0.15
    class_weight: 0.10
    switch_penalty: 0.25
  min_hold_time_s: 0.3
  delta_threshold: 0.10
  preferred_classes:
    person: 1.0

controller:
  yaw_pid:
    kp: 6.5
    ki: 0.5
    kd: 0.35
    integral_limit: 45.0
    output_limit: 200.0
    derivative_lpf_alpha: 0.35
    feedforward_kv: 0.80
  pitch_pid:
    kp: 7.0
    ki: 0.45
    kd: 0.35
    integral_limit: 45.0
    output_limit: 200.0
    derivative_lpf_alpha: 0.35
    feedforward_kv: 0.75
  max_rate_dps: 200.0
  command_lpf_alpha: 0.80
  lock_error_threshold_deg: 0.8
  lock_hold_time_s: 0.3
  predict_timeout_s: 0.25
  lost_timeout_s: 1.5
  max_track_error_timeout_s: 5.0
  high_error_multiplier: 5.0
  scan_pattern: [40.0, 20.0]
  scan_freq_hz: 0.15
  scan_yaw_scale: 1.0
  scan_pitch_scale: 0.3
  scan_pitch_freq_ratio: 0.7
  latency_compensation_s: 0.033
  ballistic:
    enabled: false
    model_type: "simple"
    target_height_m: 1.8
    quadratic_a: 0.001
    quadratic_b: 0.01
    quadratic_c: 0.0
  adaptive_pid:
    enabled: true
    scheduler_type: "error_based"
    low_error_threshold_deg: 1.0
    high_error_threshold_deg: 5.0
    low_error_kp_scale: 0.6
    high_error_kp_scale: 1.5

driver_limits:
  yaw_min_deg: -160.0
  yaw_max_deg: 160.0
  pitch_min_deg: -45.0
  pitch_max_deg: 75.0
  max_rate_dps: 240.0
  deadband_dps: 0.2
  inertia_time_constant_s: 0.05
  static_friction_dps: 0.5
  coulomb_friction_dps: 2.0

projectile:
  enabled: false

environment:
  temperature_c: 15.0
  pressure_hpa: 1013.25
  humidity_pct: 50.0
  wind_speed_mps: 0.0
  wind_direction_deg: 0.0
  altitude_m: 0.0

lead_angle:
  enabled: false

trajectory:
  enabled: true
  max_rate_dps: 200.0
  max_acceleration_dps2: 800.0
  settling_threshold_deg: 0.5
  use_s_curve: false
  max_jerk_dps3: 3600.0
  min_switch_interval_s: 0.2

engagement:
  enabled: true
  strategy: "threat_first"
  max_engagement_range_m: 500.0
  min_threat_threshold: 0.05
  distance_decay_m: 50.0
  velocity_norm_px_s: 200.0
  target_height_m: 1.8
  sector_size_deg: 30.0
  weights:
    distance: 0.30
    velocity: 0.25
    class_threat: 0.20
    heading: 0.15
    size: 0.10

safety:
  enabled: false
  nfz_slow_down_margin_deg: 5.0
  interlock:
    require_operator_auth: false
    min_lock_time_s: 0.0
    min_engagement_range_m: 0.0
    max_engagement_range_m: 9999.0
    system_check_interval_s: 999.0
    heartbeat_timeout_s: 999.0
  zones: []

rangefinder:
  enabled: false
  type: "simulated"
  max_range_m: 1500.0
  min_range_m: 1.0
  noise_std_m: 0.5
  failure_rate: 0.0
  max_laser_age_s: 0.5
  target_height_m: 1.8

video_stream:
  enabled: true
  jpeg_quality: 70
  max_fps: 30.0
  scale_factor: 1.0
  buffer_size: 3
  annotate_detections: true
  annotate_tracks: true
  annotate_crosshair: true
  annotate_safety_zones: false
