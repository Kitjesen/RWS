# -------------------------------------------------------
# RWS 自定义目标数据集配置
# -------------------------------------------------------
# 修改 names 列表，换成你自己的类别名称。
# 如果有多个类别，依次往后加：["target_a", "target_b", ...]
# class_id 按顺序从 0 开始，和标注 .txt 里的编号对应。
# -------------------------------------------------------

path: D:/robot/code/RWS/dataset    # 数据集根目录（绝对路径）
train: images/train                 # 相对于 path
val: images/val                     # 相对于 path

# 类别数量
nc: 1

# 类别名称（按顺序，index = class_id）
names:
  - "target"     # ← 改成你的目标名称
