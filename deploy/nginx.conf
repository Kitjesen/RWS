server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web — serve SPA with history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to RWS backend
    location /api/ {
        proxy_pass http://rws-backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # Proxy video stream
    location /stream {
        proxy_pass http://rws-backend:5000/stream;
        proxy_buffering off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Prometheus metrics passthrough (for health monitoring)
    location /metrics {
        proxy_pass http://rws-backend:5000/metrics;
    }
}
