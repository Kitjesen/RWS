# ============================================================
# RWS Mission Profile: EXERCISE
#
# Purpose : Realistic multi-unit exercise. Real hardware optional
#           (defaults to simulated driver). Simulated engagement
#           — fire commands are logged but not physically executed.
#           Relaxed timing constraints to allow fast drill cycles.
#
# Key differences from training:
#   - min_lock_time_s  : 1.5s (faster tempo)
#   - heartbeat_timeout: 8s  (more operator margin)
#   - camera           : 1280x720 HD
#   - rangefinder      : simulated with realistic noise
# ============================================================

camera:
  width: 1280
  height: 720
  fx: 970.0
  fy: 965.0
  cx: 640.0
  cy: 360.0
  distortion_k1: 0.0
  distortion_k2: 0.0
  distortion_p1: 0.0
  distortion_p2: 0.0
  distortion_k3: 0.0
  mount_roll_deg: 0.0
  mount_pitch_deg: 0.0
  mount_yaw_deg: 0.0

detector:
  model_path: "yolo11n-seg.pt"
  confidence_threshold: 0.35
  nms_iou_threshold: 0.40
  img_size: 640
  device: ""
  tracker: "botsort.yaml"
  class_whitelist:
    - person

selector:
  weights:
    confidence: 0.35
    size: 0.18
    center_proximity: 0.20
    track_age: 0.15
    class_weight: 0.10
    switch_penalty: 0.35
    velocity_approach: 0.12
  min_hold_time_s: 0.5
  delta_threshold: 0.15
  preferred_classes:
    person: 1.0
    car: 0.6

controller:
  yaw_pid:
    kp: 6.0
    ki: 0.5
    kd: 0.40
    integral_limit: 40.0
    output_limit: 180.0
    derivative_lpf_alpha: 0.35
    feedforward_kv: 0.80
  pitch_pid:
    kp: 6.5
    ki: 0.45
    kd: 0.40
    integral_limit: 40.0
    output_limit: 180.0
    derivative_lpf_alpha: 0.35
    feedforward_kv: 0.75
  max_rate_dps: 180.0
  command_lpf_alpha: 0.80
  lock_error_threshold_deg: 1.2
  lock_hold_time_s: 0.3
  predict_timeout_s: 0.50
  lost_timeout_s: 1.5
  max_track_error_timeout_s: 5.0
  high_error_multiplier: 5.0
  scan_pattern: [45.0, 18.0]
  scan_freq_hz: 0.18
  scan_yaw_scale: 1.0
  scan_pitch_scale: 0.35
  scan_pitch_freq_ratio: 0.65
  latency_compensation_s: 0.033
  ballistic:
    enabled: false
    model_type: "simple"
    target_height_m: 1.8
    quadratic_a: 0.001
    quadratic_b: 0.01
    quadratic_c: 0.0
    muzzle_velocity_mps: 900.0
    bc_g7: 0.223
    mass_kg: 0.0098
    caliber_m: 0.00762
  adaptive_pid:
    enabled: true
    scheduler_type: "error_based"
    low_error_threshold_deg: 1.2
    high_error_threshold_deg: 8.0
    low_error_multiplier: 0.55
    high_error_multiplier: 1.6

driver_limits:
  yaw_min_deg: -160.0
  yaw_max_deg: 160.0
  pitch_min_deg: -45.0
  pitch_max_deg: 75.0
  max_rate_dps: 240.0
  deadband_dps: 0.2
  inertia_time_constant_s: 0.05
  static_friction_dps: 0.5
  coulomb_friction_dps: 2.0

projectile:
  enabled: false
  muzzle_velocity_mps: 850.0
  ballistic_coefficient: 0.4
  projectile_mass_kg: 0.0098
  projectile_diameter_m: 0.00762
  drag_model: "g1"

environment:
  temperature_c: 15.0
  pressure_hpa: 1013.25
  humidity_pct: 50.0
  wind_speed_mps: 0.0
  wind_direction_deg: 0.0
  altitude_m: 0.0

lead_angle:
  enabled: true
  use_acceleration: true
  max_lead_deg: 5.0
  min_confidence: 0.3
  velocity_smoothing_alpha: 0.7
  target_height_m: 1.8
  convergence_iterations: 3

trajectory:
  enabled: false
  max_rate_dps: 180.0
  max_acceleration_dps2: 720.0
  settling_threshold_deg: 0.5
  use_s_curve: false
  max_jerk_dps3: 3600.0
  min_switch_interval_s: 0.3

engagement:
  enabled: true
  strategy: "threat_first"
  max_engagement_range_m: 500.0
  min_threat_threshold: 0.1
  distance_decay_m: 50.0
  velocity_norm_px_s: 200.0
  target_height_m: 1.8
  sector_size_deg: 30.0
  weights:
    distance: 0.30
    velocity: 0.25
    class_threat: 0.20
    heading: 0.15
    size: 0.10

# EXERCISE: safety on, relaxed lock time and heartbeat timeout for drill tempo
safety:
  enabled: true
  nfz_slow_down_margin_deg: 5.0
  interlock:
    require_operator_auth: true
    min_lock_time_s: 1.5
    min_engagement_range_m: 5.0
    max_engagement_range_m: 500.0
    system_check_interval_s: 1.0
    heartbeat_timeout_s: 8.0
  zones: []

rangefinder:
  enabled: true
  type: "simulated"
  max_range_m: 1500.0
  min_range_m: 1.0
  noise_std_m: 0.5
  failure_rate: 0.05
  max_laser_age_s: 0.5
  target_height_m: 1.8
  serial_port: ""
  serial_baud: 9600

video_stream:
  enabled: true
  jpeg_quality: 75
  max_fps: 30.0
  scale_factor: 1.0
  buffer_size: 3
  annotate_detections: true
  annotate_tracks: true
  annotate_crosshair: true
  annotate_safety_zones: true
