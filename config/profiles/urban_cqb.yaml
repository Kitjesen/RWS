# ============================================================
# Mission Profile: Urban CQB (Close-Quarters Battle)
# Short range 5-100m, tight NFZ, fast PID, high switch penalty
# ============================================================

camera:
  width: 1280
  height: 720
  fx: 970.0
  fy: 965.0
  cx: 640.0
  cy: 360.0

detector:
  model_path: "yolo11n-seg.pt"
  confidence_threshold: 0.35
  nms_iou_threshold: 0.40
  img_size: 640
  device: ""
  tracker: "botsort.yaml"
  class_whitelist:
    - person

selector:
  weights:
    confidence: 0.30
    size: 0.25
    center_proximity: 0.25
    track_age: 0.10
    class_weight: 0.10
    switch_penalty: 0.50
  min_hold_time_s: 0.6
  delta_threshold: 0.15
  preferred_classes:
    person: 1.0

controller:
  yaw_pid:
    kp: 7.0
    ki: 0.6
    kd: 0.40
    integral_limit: 50.0
    output_limit: 200.0
    derivative_lpf_alpha: 0.35
    feedforward_kv: 0.85
  pitch_pid:
    kp: 7.5
    ki: 0.5
    kd: 0.40
    integral_limit: 50.0
    output_limit: 200.0
    derivative_lpf_alpha: 0.35
    feedforward_kv: 0.80
  max_rate_dps: 220.0
  command_lpf_alpha: 0.80
  lock_error_threshold_deg: 0.6
  lock_hold_time_s: 0.3
  predict_timeout_s: 0.20
  lost_timeout_s: 1.0
  max_track_error_timeout_s: 3.0
  high_error_multiplier: 4.0
  scan_pattern: [30.0, 15.0]
  scan_freq_hz: 0.20
  scan_yaw_scale: 1.0
  scan_pitch_scale: 0.4
  scan_pitch_freq_ratio: 0.7
  latency_compensation_s: 0.033
  ballistic:
    enabled: false
    model_type: "simple"
    target_height_m: 1.8
    quadratic_a: 0.001
    quadratic_b: 0.01
    quadratic_c: 0.0
  adaptive_pid:
    enabled: true
    scheduler_type: "error_based"
    low_error_threshold_deg: 0.8
    high_error_threshold_deg: 4.0
    low_error_kp_scale: 0.7
    high_error_kp_scale: 1.6

driver_limits:
  yaw_min_deg: -160.0
  yaw_max_deg: 160.0
  pitch_min_deg: -45.0
  pitch_max_deg: 75.0
  max_rate_dps: 240.0
  deadband_dps: 0.2
  inertia_time_constant_s: 0.05
  static_friction_dps: 0.5
  coulomb_friction_dps: 2.0

projectile:
  enabled: false

environment:
  temperature_c: 15.0
  pressure_hpa: 1013.25
  humidity_pct: 50.0
  wind_speed_mps: 0.0
  wind_direction_deg: 0.0
  altitude_m: 0.0

lead_angle:
  enabled: true
  use_acceleration: true
  max_lead_deg: 3.0
  min_confidence: 0.35
  velocity_smoothing_alpha: 0.6
  target_height_m: 1.8
  convergence_iterations: 2

trajectory:
  enabled: true
  max_rate_dps: 200.0
  max_acceleration_dps2: 900.0
  settling_threshold_deg: 0.4
  use_s_curve: false
  max_jerk_dps3: 3600.0
  min_switch_interval_s: 0.2

engagement:
  enabled: true
  strategy: "threat_first"
  max_engagement_range_m: 100.0
  min_threat_threshold: 0.15
  distance_decay_m: 20.0
  velocity_norm_px_s: 200.0
  target_height_m: 1.8
  sector_size_deg: 20.0
  weights:
    distance: 0.35
    velocity: 0.25
    class_threat: 0.20
    heading: 0.15
    size: 0.05

safety:
  enabled: true
  nfz_slow_down_margin_deg: 3.0
  interlock:
    require_operator_auth: true
    min_lock_time_s: 0.8
    min_engagement_range_m: 5.0
    max_engagement_range_m: 100.0
    system_check_interval_s: 0.5
    heartbeat_timeout_s: 3.0
  zones: []

rangefinder:
  enabled: false
  type: "simulated"
  max_range_m: 150.0
  min_range_m: 1.0
  noise_std_m: 0.3
  failure_rate: 0.05
  max_laser_age_s: 0.3
  target_height_m: 1.8

video_stream:
  enabled: true
  jpeg_quality: 70
  max_fps: 30.0
  scale_factor: 1.0
  buffer_size: 3
  annotate_detections: true
  annotate_tracks: true
  annotate_crosshair: true
  annotate_safety_zones: true
