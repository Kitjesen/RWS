# ============================================================
# Mission Profile: Surveillance
# No fire authorized, tracking only, telemetry maximized,
# smooth tracking with weak selector weights
# ============================================================

camera:
  width: 1280
  height: 720
  fx: 970.0
  fy: 965.0
  cx: 640.0
  cy: 360.0

detector:
  model_path: "yolo11n-seg.pt"
  confidence_threshold: 0.25
  nms_iou_threshold: 0.50
  img_size: 640
  device: ""
  tracker: "botsort.yaml"
  class_whitelist:
    - person
    - car

selector:
  weights:
    confidence: 0.20
    size: 0.15
    center_proximity: 0.30
    track_age: 0.25
    class_weight: 0.10
    switch_penalty: 0.15
  min_hold_time_s: 1.0
  delta_threshold: 0.20
  preferred_classes:
    person: 1.0
    car: 0.8

controller:
  yaw_pid:
    kp: 3.0
    ki: 0.2
    kd: 0.30
    integral_limit: 30.0
    output_limit: 120.0
    derivative_lpf_alpha: 0.5
    feedforward_kv: 0.50
  pitch_pid:
    kp: 3.0
    ki: 0.2
    kd: 0.30
    integral_limit: 30.0
    output_limit: 120.0
    derivative_lpf_alpha: 0.5
    feedforward_kv: 0.45
  max_rate_dps: 120.0
  command_lpf_alpha: 0.55
  lock_error_threshold_deg: 1.0
  lock_hold_time_s: 0.8
  predict_timeout_s: 0.40
  lost_timeout_s: 3.0
  max_track_error_timeout_s: 8.0
  high_error_multiplier: 6.0
  scan_pattern: [60.0, 30.0]
  scan_freq_hz: 0.08
  scan_yaw_scale: 1.5
  scan_pitch_scale: 0.3
  scan_pitch_freq_ratio: 0.5
  latency_compensation_s: 0.033
  ballistic:
    enabled: false
    model_type: "simple"
    target_height_m: 1.8
    quadratic_a: 0.001
    quadratic_b: 0.01
    quadratic_c: 0.0
  adaptive_pid:
    enabled: false

driver_limits:
  yaw_min_deg: -160.0
  yaw_max_deg: 160.0
  pitch_min_deg: -45.0
  pitch_max_deg: 75.0
  max_rate_dps: 180.0
  deadband_dps: 0.2
  inertia_time_constant_s: 0.05
  static_friction_dps: 0.5
  coulomb_friction_dps: 2.0

projectile:
  enabled: false

environment:
  temperature_c: 15.0
  pressure_hpa: 1013.25
  humidity_pct: 50.0
  wind_speed_mps: 0.0
  wind_direction_deg: 0.0
  altitude_m: 0.0

lead_angle:
  enabled: false

trajectory:
  enabled: false

engagement:
  enabled: false
  strategy: "threat_first"
  max_engagement_range_m: 500.0
  min_threat_threshold: 0.1
  distance_decay_m: 50.0
  velocity_norm_px_s: 200.0
  target_height_m: 1.8
  sector_size_deg: 30.0
  weights:
    distance: 0.30
    velocity: 0.25
    class_threat: 0.20
    heading: 0.15
    size: 0.10

safety:
  enabled: true
  nfz_slow_down_margin_deg: 5.0
  interlock:
    require_operator_auth: true
    min_lock_time_s: 999.0
    min_engagement_range_m: 9999.0
    max_engagement_range_m: 0.0
    system_check_interval_s: 1.0
    heartbeat_timeout_s: 10.0
  zones: []

rangefinder:
  enabled: false
  type: "simulated"
  max_range_m: 1500.0
  min_range_m: 1.0
  noise_std_m: 0.5
  failure_rate: 0.05
  max_laser_age_s: 0.5
  target_height_m: 1.8

video_stream:
  enabled: true
  jpeg_quality: 80
  max_fps: 30.0
  scale_factor: 1.0
  buffer_size: 5
  annotate_detections: true
  annotate_tracks: true
  annotate_crosshair: true
  annotate_safety_zones: false
